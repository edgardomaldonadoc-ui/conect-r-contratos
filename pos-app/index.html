<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="A state of the art, ultra-fast restaurant POS system with premium glassmorphism design.">
  <title>AeroPOS - Point of Sale</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  
  <div class="app-container">
    <!-- Left Navigation Dock -->
    <nav class="navigation-dock">
      <div class="dock-logo" title="AeroPOS">A</div>
      
      <button class="dock-btn active" id="btn-tables" data-view="tables">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 0 1 6 3.75h2.25A2.25 2.25 0 0 1 10.5 6v2.25a2.25 2.25 0 0 1-2.25 2.25H6a2.25 2.25 0 0 1-2.25-2.25V6ZM3.75 15.75A2.25 2.25 0 0 1 6 13.5h2.25a2.25 2.25 0 0 1 2.25 2.25V18a2.25 2.25 0 0 1-2.25 2.25H6A2.25 2.25 0 0 1 3.75 18v-2.25ZM13.5 6a2.25 2.25 0 0 1 2.25-2.25H18A2.25 2.25 0 0 1 20.25 6v2.25A2.25 2.25 0 0 1 18 10.5h-2.25a2.25 2.25 0 0 1-2.25-2.25V6ZM13.5 15.75a2.25 2.25 0 0 1 2.25-2.25H18a2.25 2.25 0 0 1 2.25 2.25V18A2.25 2.25 0 0 1 18 20.25h-2.25A2.25 2.25 0 0 1 13.5 18v-2.25Z" />
        </svg>
        <span>Tables</span>
      </button>

      <button class="dock-btn" id="btn-menu" data-view="menu">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-16.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-16.25v16.25" />
        </svg>
        <span>Menu</span>
      </button>

      <button class="dock-btn" id="btn-kds" data-view="kds">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 5.25h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5m-16.5 4.5h16.5" />
        </svg>
        <span>Kitchen</span>
      </button>

      <div class="dock-footer">
        <button class="dock-btn" id="btn-takeout" title="Quick Takeout">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
          </svg>
          <span>Takeout</span>
        </button>

        <button class="theme-toggle-btn dock-btn" id="theme-toggle" title="Toggle Light/Dark Theme">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" id="theme-sun-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21m9.75-9h-2.25m-13.5 0H3m16.035-7.035-1.59 1.59M5.25 18.75l1.59-1.59m0-9.18 1.59 1.59m9.18 9.18 1.59-1.59M12 10.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3Z" />
          </svg>
        </button>
      </div>
    </nav>

    <!-- Main Workspace Area -->
    <main class="workspace">
      <!-- Left Content Pane -->
      <section class="content-pane">
        <!-- Persistent Top Header -->
        <header class="pane-header">
          <div class="header-title" id="pane-title-area">
            <h1>Floor Map</h1>
            <p>Main dining hall table layouts</p>
          </div>
          <div class="header-actions">
            <!-- Search bar -->
            <div class="search-wrapper hidden" id="menu-search-wrapper">
              <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.608 10.608Z" />
              </svg>
              <input type="text" class="search-input" id="search-bar" placeholder="Search menu items...">
            </div>
            
            <button class="btn btn-secondary" id="btn-clock-in">
              Clock In/Out
            </button>
          </div>
        </header>

        <!-- Dynamic Content Mounts -->
        <div id="floor-plan-view" class="floor-plan-container">
          <!-- Rendered by tables.js -->
        </div>

        <div id="menu-view" class="menu-container hidden">
          <!-- Rendered by menu.js -->
        </div>

        <div id="kds-view" class="kds-container hidden">
          <!-- Rendered by kds.js -->
        </div>
      </section>

      <!-- Right Order Summary Cart Pane -->
      <aside class="cart-panel" id="cart-panel-element">
        <!-- Rendered by cart.js -->
      </aside>
    </main>
  </div>

  <!-- MODAL / DIALOG OVERLAYS -->
  <!-- 1. Modifiers Selector Modal -->
  <div class="modal-overlay" id="modifiers-modal">
    <div class="modal-container">
      <div class="modal-header">
        <h3 id="mod-modal-title">Customize Item</h3>
        <button class="modal-close" id="mod-modal-close">✕</button>
      </div>
      <div class="modal-body" id="mod-modal-body">
        <!-- Dynamically generated modifiers groups -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="mod-cancel-btn">Cancel</button>
        <button class="btn btn-primary" id="mod-add-btn">Add to Order</button>
      </div>
    </div>
  </div>

  <!-- 2. Checkout Modal -->
  <div class="modal-overlay" id="checkout-modal">
    <div class="modal-container" style="max-width: 720px;">
      <div class="modal-header">
        <h3>Checkout & Pay</h3>
        <button class="modal-close" id="checkout-modal-close">✕</button>
      </div>
      <div class="modal-body" id="checkout-modal-body">
        <!-- Rendered by checkout.js -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="checkout-cancel-btn">Back</button>
        <button class="btn btn-primary" id="checkout-complete-btn" disabled>Complete Payment</button>
      </div>
    </div>
  </div>

  <!-- Import application setup script -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
